<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
</head>
<body>
    <h1>My Expenses</h1>
    <a href="/add">Add New Expense</a>
    <br><br>
    <table border="1">
        <tr>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
        {% for e in expenses %}
        <tr>
            <td>{{ e[1] }}</td>
            <td>{{ e[2] }}</td>
            <td>{{ e[3] }}</td>
            <td>{{ e[4] }}</td>
            <td><a href="/delete/{{ e[0] }}">Delete</a></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
